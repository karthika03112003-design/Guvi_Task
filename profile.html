<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile - GUVI Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./css/profile.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="./index.html">
          <i class="bi bi-shield-lock me-2"></i>GUVI Task
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <span class="nav-link user-badge" id="navUser">
                <i class="bi bi-person-circle me-1"></i>
                <span id="navEmail">Loading...</span>
              </span>
            </li>
            <li class="nav-item">
              <button id="logoutBtn" type="button" class="btn btn-outline-light btn-sm ms-2">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Profile Content -->
    <section class="profile-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-10 col-xl-8">

            <!-- Profile Header Card -->
            <div class="profile-header-card">
              <div class="profile-header-bg"></div>
              <div class="profile-header-content">
                <div class="avatar">
                  <i class="bi bi-person-fill"></i>
                </div>
                <div class="profile-meta">
                  <h3 id="headerName">User</h3>
                  <p id="whoAmI">Loading session...</p>
                </div>
                <div class="session-badge">
                  <i class="bi bi-bolt-fill"></i>
                  <span>Redis Session</span>
                </div>
              </div>
            </div>

            <!-- Alert -->
            <div id="alertBox" class="alert d-none" role="alert"></div>

            <!-- Profile Form Card -->
            <div class="profile-form-card">
              <div class="form-section-title">
                <i class="bi bi-person-lines-fill"></i>
                <h5>Personal Information</h5>
              </div>

              <form id="profileForm" autocomplete="off">
                <div class="row g-4">
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="fullName" placeholder="Full Name" required />
                      <label for="fullName"><i class="bi bi-person me-2"></i>Full Name</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="email" class="form-control" id="email" placeholder="Email" disabled />
                      <label for="email"><i class="bi bi-envelope me-2"></i>Email</label>
                    </div>
                  </div>

                  <div class="col-md-4">
                    <div class="form-floating">
                      <input type="number" min="1" max="120" class="form-control" id="age" placeholder="Age" />
                      <label for="age"><i class="bi bi-calendar-event me-2"></i>Age</label>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="form-floating">
                      <input type="date" class="form-control" id="dob" placeholder="Date of Birth" />
                      <label for="dob"><i class="bi bi-calendar3 me-2"></i>Date of Birth</label>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="contact" placeholder="Contact" />
                      <label for="contact"><i class="bi bi-telephone me-2"></i>Contact</label>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="form-floating">
                      <textarea class="form-control" id="address" rows="3" placeholder="Address"></textarea>
                      <label for="address"><i class="bi bi-geo-alt me-2"></i>Address</label>
                    </div>
                  </div>
                </div>

                <div class="form-actions">
                  <button id="saveBtn" type="button" class="btn btn-primary btn-lg">
                    <i class="bi bi-check-circle me-2"></i>Save Changes
                  </button>
                  <button id="refreshBtn" type="button" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-arrow-clockwise me-2"></i>Refresh
                  </button>
                </div>
              </form>
            </div>

            <!-- Tech Info -->
            <div class="tech-info-bar">
              <div class="tech-item">
                <i class="bi bi-leaf"></i>
                <span>User data: MongoDB Atlas</span>
              </div>
              <div class="tech-item">
                <i class="bi bi-database"></i>
                <span>Profile data: Aiven MySQL</span>
              </div>
              <div class="tech-item">
                <i class="bi bi-bolt"></i>
                <span>Session: Redis</span>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="./js/profile.js"></script>
  </body>
</html>
